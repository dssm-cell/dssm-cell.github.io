<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>PetVit</title>
  <link rel="stylesheet" href="style.css">
</head>

 <body>
  
  <header class="topo">
    <h1>🐾 PetVit</h1>
  </header>
 
<main>
  <section class="intro">
      <p>
        Nesse site você pode adotar animais e comprar produtos para o seu pet!
      </p>
    </section>

    <section>
      <h2>Pets para Adoção</h2>

<div class="cards">

    <div class="card">
      <img src="cavachon.jpg" alt="Cachorro">
      <h3>Derick</h3>
      <p>2 anos</p>
      <p>Raça: Cavachon</p>
      <button>Adotar</button>
    </div>

    <div class="card">
      <img src="gatopreto.jfif" alt="Gato">
      <h3>Millie</h3>
      <p>3 anos</p>
      <p>Raça: Gato doméstico</p>
      <button>Adotar</button>
    </div>

    <div class="card">
      <img src="caramelo.jfif" alt="Cachorro">
      <h3>Rex</h3>
      <p>1 ano</p>
      <p>Raça: Vira-lata</p>
      <button>Adotar</button>
    </div>
  </div>
</section>

<section class="acoes">
      <button>Mais Pets</button>
      <button>Comprar Produtos</button>
    </section>

    </main>
  </body>
</html>
